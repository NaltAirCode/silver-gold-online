<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha | S&G</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #D4AF37; }
        .helptext { display: none; } /* Esconde as regras chatas de senha do Django para ficar limpo */
        ul { list-style: none; padding: 0; color: #ff6b6b; font-size: 0.8rem; margin-top: -10px; margin-bottom: 15px; text-align: left; }
        button { width: 100%; padding: 12px; background: #D4AF37; color: black; font-weight: bold; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b8952d; }
    </style>
</head>
<body>
    <div class="box">
        {% if validlink %}
            <h1>Criar Nova Senha</h1>
            <p>Digite sua nova senha abaixo.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Salvar Nova Senha</button>
            </form>
        {% else %}
            <h1>Link Inválido</h1>
            <p>Este link de recuperação expirou ou já foi utilizado. Por favor, solicite um novo.</p>
            <a href="{% url 'password_reset' %}" style="color: #D4AF37;">Solicitar novo link</a>
        {% endif %}
    </div>
</body>
</html>
