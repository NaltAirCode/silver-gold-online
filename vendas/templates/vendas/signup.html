<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro | Silver&Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ouro: #D4AF37; --preto: #050505; --cinza-escuro: #111; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--preto); color: white; }
        
        /* Nav minimalista igual a da categoria */
        nav { padding: 25px 5%; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--ouro); text-decoration: none; letter-spacing: 5px; font-weight: 700; }
        .voltar { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .voltar:hover { color: var(--ouro); }

        /* Estilos do Formulário de Cadastro */
        .auth-container { 
            max-width: 400px; 
            margin: 60px auto; 
            padding: 40px; 
            background: #0a0a0a; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 8px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-family: 'Cinzel', serif; color: var(--ouro); letter-spacing: 3px; margin-bottom: 10px; }
        .auth-header p { color: #666; font-size: 0.85rem; }

        /* Forçando a formatação dos campos que o Django gera sozinho */
        .auth-form p { margin-bottom: 20px; text-align: left; }
        .auth-form label { display: block; color: var(--ouro); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .auth-form input { 
            width: 100%; 
            box-sizing: border-box; /* Impede que o input vaze da div */
            padding: 12px; 
            background: #111; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 4px; 
            transition: 0.3s; 
        }
        .auth-form input:focus { border-color: var(--ouro); outline: none; background: #151515; }
        
        .helptext, .errorlist { font-size: 0.7rem; color: #555; margin-top: 5px; list-style: none; padding: 0; text-align: left; display: block; }
        
        .btn-auth { 
            width: 100%; 
            padding: 15px; 
            background: transparent; 
            border: 1px solid var(--ouro); 
            color: var(--ouro); 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.4s; 
            margin-top: 10px; 
        }
        .btn-auth:hover { background: var(--ouro); color: black; }

        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.8rem; color: #666; }
        .auth-footer a { color: var(--ouro); text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'vitrine' %}" class="logo">S&G</a>
    <a href="{% url 'vitrine' %}" class="voltar">← Voltar à Boutique</a>
</nav>

<div class="auth-container">
    <div class="auth-header">
        <h2>CADASTRO</h2>
        <p>Crie sua conta para acessar preços e coleções exclusivas.</p>
    </div>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-auth">Finalizar Cadastro</button>
    </form>

    <div class="auth-footer">
        Já possui uma conta? <a href="{% url 'login' %}">Faça Login</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Mapeia os campos gerados pelo Django
        const cpfInput = document.getElementById('id_cpf');
        const phoneInput = document.getElementById('id_whatsapp');

        // Máscara para o CPF: 000.000.000-00
        if (cpfInput) {
            cpfInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não for número
                
                if (value.length > 11) value = value.slice(0, 11); // Limita a 11 números
                
                // Aplica a formatação
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                
                e.target.value = value;
            });
        }

        // Máscara para o WhatsApp: (00) 00000-0000
        if (phoneInput) {
            phoneInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não for número
                
                if (value.length > 11) value = value.slice(0, 11); // Limita a 11 números
                
                // Aplica a formatação
                value = value.replace(/^(\d{2})(\d)/g, '($1) $2'); // Coloca os parênteses no DDD
                value = value.replace(/(\d)(\d{4})$/, '$1-$2');    // Coloca o traço no meio do número
                
                e.target.value = value;
            });
        }
    });
</script>

</body>
</html>
