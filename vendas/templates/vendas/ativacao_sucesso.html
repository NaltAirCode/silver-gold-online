<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conta Ativada | G&S</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 10px; font-size: 1.6rem; }
        p { color: #888; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }
        .btn-ouro { display: inline-block; width: 100%; padding: 12px; background: #D4AF37; color: black; font-weight: bold; text-transform: uppercase; text-decoration: none; border-radius: 4px; transition: 0.3s; box-sizing: border-box; }
        .btn-ouro:hover { background: #b8952d; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Conta Ativada!</h1>
        <p>Sua identidade foi confirmada com sucesso. Você já possui acesso liberado à nossa coleção.</p>
        <a href="{% url 'login' %}" class="btn-ouro">Fazer Login Agora</a>
    </div>
</body>
</html>
