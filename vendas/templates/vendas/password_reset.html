<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha | S&G</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        input:focus { outline: none; border-color: #D4AF37; }
        button { width: 100%; padding: 12px; background: #D4AF37; color: black; font-weight: bold; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8952d; }
        .voltar { display: block; margin-top: 20px; color: #D4AF37; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Recuperar Senha</h1>
        <p>Informe o seu e-mail cadastrado. Enviaremos um link seguro para você criar uma nova senha.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit">Enviar Link</button>
        </form>
        <a href="{% url 'login' %}" class="voltar">Voltar para o Login</a>
    </div>
</body>
</html>
